services:
  postgres_db:
    image: postgres:15-alpine
    container_name: music_service_db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: my_secret_password
      POSTGRES_DB: music_app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: music_service_cache
    ports:
      - "6379:6379"

  nats_broker:
    image: nats:2.10-alpine
    container_name: music_service_broker
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  pgdata:
